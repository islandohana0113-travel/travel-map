<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ふたりの旅メモ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --sand: #f5f0e8;
    --moss: #4a7c59;
    --visited: #4a7c59;
    --visited-stroke: #2d5a3d;
    --unvisited: #e8e4dc;
    --unvisited-stroke: #c8c2b8;
    --accent: #c9622a;
    --soft: #8b7355;
    --white: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--sand); color: var(--ink); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; }
  header { background: var(--ink); color: var(--white); padding: 18px 28px; display: flex; align-items: baseline; gap: 14px; }
  header h1 { font-family: 'Noto Serif JP', serif; font-size: 1.5rem; letter-spacing: 0.05em; }
  header span { font-size: 0.78rem; color: #aaa; letter-spacing: 0.1em; }
  .layout { display: grid; grid-template-columns: 1fr 370px; min-height: calc(100vh - 60px); }
  .map-section { padding: 28px; display: flex; flex-direction: column; gap: 14px; }
  .stats-bar { display: flex; gap: 22px; align-items: center; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-num { font-family: 'Noto Serif JP', serif; font-size: 1.9rem; font-weight: 700; color: var(--moss); line-height: 1; }
  .stat-label { font-size: 0.7rem; color: var(--soft); letter-spacing: 0.07em; }
  .stat-divider { width: 1px; height: 38px; background: var(--unvisited-stroke); }
  .map-legend { display: flex; gap: 14px; align-items: center; font-size: 0.73rem; color: var(--soft); }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 13px; height: 13px; border-radius: 3px; }
  #japan-map { width: 100%; max-width: 580px; cursor: pointer; }
  .prefecture { fill: var(--unvisited); stroke: var(--unvisited-stroke); stroke-width: 0.4; transition: fill 0.18s, opacity 0.12s; }
  .prefecture.visited { fill: var(--visited); stroke: var(--visited-stroke); }
  .prefecture:hover { opacity: 0.72; }
  .map-tip { font-size: 0.7rem; color: var(--soft); }
  .sidebar { background: var(--white); border-left: 1px solid #e0dbd0; display: flex; flex-direction: column; }
  .sidebar-tabs { display: flex; border-bottom: 1px solid #e0dbd0; }
  .tab { flex: 1; padding: 13px; text-align: center; font-size: 0.78rem; letter-spacing: 0.04em; cursor: pointer; color: var(--soft); border: none; background: none; border-bottom: 2px solid transparent; transition: all 0.15s; font-family: 'Noto Sans JP', sans-serif; }
  .tab.active { color: var(--moss); border-bottom-color: var(--moss); font-weight: 500; }
  .tab-content { flex: 1; overflow-y: auto; padding: 18px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  .form-group { margin-bottom: 12px; }
  label { display: block; font-size: 0.72rem; color: var(--soft); margin-bottom: 4px; letter-spacing: 0.04em; }
  input, select, textarea { width: 100%; padding: 8px 11px; border: 1px solid #ddd; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.83rem; color: var(--ink); background: var(--sand); transition: border-color 0.15s; }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--moss); background: var(--white); }
  textarea { resize: vertical; min-height: 65px; }
  .btn-add { width: 100%; padding: 10px; background: var(--moss); color: var(--white); border: none; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.83rem; font-weight: 500; cursor: pointer; letter-spacing: 0.05em; transition: background 0.15s; margin-top: 4px; }
  .btn-add:hover { background: #3a6347; }
  .trip-card { border: 1px solid #e8e4dc; border-radius: 8px; padding: 12px; margin-bottom: 10px; background: var(--sand); position: relative; }
  .trip-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .trip-pref { font-weight: 500; font-size: 0.88rem; }
  .trip-place { font-size: 0.78rem; color: var(--soft); margin-bottom: 3px; }
  .trip-date { font-size: 0.72rem; color: #aaa; }
  .trip-cost { font-size: 0.75rem; color: var(--accent); font-weight: 500; margin-top: 3px; }
  .trip-memo { font-size: 0.75rem; color: var(--soft); margin-top: 5px; line-height: 1.5; border-top: 1px solid #e0dbd0; padding-top: 5px; }
  .card-actions { display: flex; gap: 6px; }
  .btn-edit { background: none; border: none; color: #bbb; cursor: pointer; font-size: 0.85rem; padding: 0 2px; transition: color 0.15s; }
  .btn-edit:hover { color: var(--moss); }
  .btn-delete { background: none; border: none; color: #ccc; cursor: pointer; font-size: 0.9rem; padding: 0 2px; transition: color 0.15s; }
  .btn-delete:hover { color: var(--accent); }
  .edit-notice { background: #fff8e1; border: 1px solid #f0d080; border-radius: 6px; padding: 8px 12px; font-size: 0.75rem; color: #7a6000; margin-bottom: 10px; display: none; }
  .edit-notice a { color: var(--accent); cursor: pointer; text-decoration: underline; }
  .empty-state { text-align: center; color: #bbb; font-size: 0.8rem; padding: 36px 0; line-height: 2.2; }
  .filter-row { margin-bottom: 14px; }
  .filter-row select { font-size: 0.76rem; padding: 6px 10px; }
  .map-tooltip { position: fixed; background: var(--ink); color: var(--white); padding: 5px 11px; border-radius: 5px; font-size: 0.72rem; pointer-events: none; opacity: 0; transition: opacity 0.12s; z-index: 100; white-space: nowrap; }
  .json-box { background: #1a1a2e; color: #a8d8b9; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 0.78rem; line-height: 1.7; margin-top: 10px; word-break: break-all; white-space: pre-wrap; }
  .copy-btn { width: 100%; padding: 8px; background: var(--soft); color: var(--white); border: none; border-radius: 6px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.78rem; cursor: pointer; margin-top: 8px; }
  .copy-btn:hover { background: #6b5535; }
  .instructions { font-size: 0.75rem; color: var(--soft); line-height: 1.8; margin-top: 10px; }
  .instructions a { color: var(--moss); }
  @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } .sidebar { border-left: none; border-top: 1px solid #e0dbd0; } .map-section { padding: 14px; } }
</style>
</head>

const PREF_NAMES = PREFECTURES.map(p => p.name);

// Build SVG map
const svg = document.getElementById('japan-map');
PREFECTURES.forEach(p => {
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  path.setAttribute('class', 'prefecture');
  path.setAttribute('d', p.path);
  path.setAttribute('data-pref', p.name);
  path.addEventListener('click', () => {
    document.getElementById('f-pref').value = p.name;
    switchTab('add');
  });
  path.addEventListener('mousemove', (e) => {
    const tip = document.getElementById('tooltip');
    const visited = trips.map(t => t.pref).includes(p.name);
    tip.textContent = p.name + (visited ? '（訪問済み）' : '');
    tip.style.left = (e.clientX + 13) + 'px';
    tip.style.top = (e.clientY - 8) + 'px';
    tip.style.opacity = '1';
  });
  path.addEventListener('mouseleave', () => {
    document.getElementById('tooltip').style.opacity = '0';
  });
  svg.appendChild(path);
});



// Load trips.json from GitHub Pages
let trips = [];

async function loadTrips() {
  try {
    const res = await fetch('trips.json?t=' + Date.now());
    trips = await res.json();
  } catch(e) {
    trips = [];
  }
  updateMap();
  updateStats();
  renderList();
}

function updateMap() {
  const visited = [...new Set(trips.map(t => t.pref))];
  document.querySelectorAll('.prefecture').forEach(el => {
    el.classList.toggle('visited', visited.includes(el.dataset.pref));
  });
}

function updateStats() {
  const visited = [...new Set(trips.map(t => t.pref))];
  document.getElementById('visited-count').textContent = visited.length;
  document.getElementById('trips-count').textContent = trips.length;
  const total = trips.reduce((s, t) => s + (parseInt(t.cost) || 0), 0);
  document.getElementById('total-cost').textContent = total > 0 ? '¥' + total.toLocaleString() : '¥0';
}

function renderList() {
  const fp = document.getElementById('filter-pref').value;
  const list = document.getElementById('trip-list');
  const filtered = fp ? trips.filter(t => t.pref === fp) : trips;
  const sorted = [...filtered].sort((a, b) => (b.date||'').localeCompare(a.date||''));
  if (sorted.length === 0) {
    list.innerHTML = '<div class="empty-state">まだ記録がありません<br>旅行を追加してみてね</div>';
    return;
  }
  list.innerHTML = sorted.map((t) => {
    const realIdx = trips.indexOf(t);
    return `
    <div class="trip-card">
      <div class="trip-card-header">
        <div>
          <div class="trip-pref">${t.pref}</div>
          ${t.place ? `<div class="trip-place">${t.place}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn-edit" onclick="startEdit(${realIdx})">✏️</button>
          <button class="btn-delete" onclick="deleteTrip(${realIdx})">✕</button>
        </div>
      </div>
      <div class="trip-date">${t.date || '日付なし'}</div>
      ${t.cost ? `<div class="trip-cost">¥${parseInt(t.cost).toLocaleString()}</div>` : ''}
      ${t.memo ? `<div class="trip-memo">${t.memo}</div>` : ''}
    </div>`;
  }).join('');
}

function startEdit(idx) {
  const t = trips[idx];
  document.getElementById('f-pref').value = t.pref;
  document.getElementById('f-place').value = t.place || '';
  document.getElementById('f-date').value = t.date || '';
  document.getElementById('f-cost').value = t.cost || '';
  document.getElementById('f-memo').value = t.memo || '';
  document.getElementById('edit-idx').value = idx;
  document.getElementById('btn-generate').textContent = '修正してJSONを生成する';
  document.getElementById('edit-notice').style.display = 'block';
  document.getElementById('json-output').style.display = 'none';
  switchTab('add');
}

function cancelEdit() {
  document.getElementById('edit-idx').value = '';
  document.getElementById('btn-generate').textContent = 'JSONを生成する';
  document.getElementById('edit-notice').style.display = 'none';
  document.getElementById('f-pref').value = '';
  document.getElementById('f-place').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-cost').value = '';
  document.getElementById('f-memo').value = '';
  document.getElementById('json-output').style.display = 'none';
}

async function deleteTrip(idx) {
  if (!confirm('この記録を削除しますか？')) return;
  const newTrips = trips.filter((_, i) => i !== idx);
  const ok = await saveToGitHub(newTrips);
  if (ok) {
    trips = newTrips;
    updateMap();
    updateStats();
    renderList();
    alert('✅ 削除しました！');
  }
}

const GITHUB_OWNER = 'islandohana0113-travel';
const GITHUB_REPO = 'travel-map';
const GITHUB_FILE = 'trips.json';

function saveToken() {
  const token = document.getElementById('gh-token').value.trim();
  if (!token) return;
  localStorage.setItem('gh_token', token);
  document.getElementById('token-status').textContent = '✅ 保存しました';
  setTimeout(() => document.getElementById('token-status').textContent = '', 2000);
}

function getToken() {
  const stored = localStorage.getItem('gh_token');
  if (stored) document.getElementById('gh-token').value = stored;
  return stored || document.getElementById('gh-token').value.trim();
}

async function saveToGitHub(newTrips) {
  const token = getToken();
  if (!token) { alert('GitHubトークンを入力してください'); return false; }

  // Get current file SHA
  const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) { alert('GitHubへの接続に失敗しました。トークンを確認してください。'); return false; }
  const fileData = await res.json();
  const sha = fileData.sha;

  // Update file
  const jsonStr = JSON.stringify(newTrips, null, 2);
  const encoded = btoa(unescape(encodeURIComponent(jsonStr)));
  const updateRes = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
    method: 'PUT',
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: 'Update trips.json', content: encoded, sha })
  });
  if (!updateRes.ok) { alert('保存に失敗しました'); return false; }
  return true;
}

async function generateJSON() {
  const pref = document.getElementById('f-pref').value;
  if (!pref) { alert('都道府県を選んでください'); return; }

  const entry = {
    pref,
    place: document.getElementById('f-place').value,
    date: document.getElementById('f-date').value,
    cost: document.getElementById('f-cost').value,
    memo: document.getElementById('f-memo').value,
  };

  const editIdx = document.getElementById('edit-idx').value;
  let newTrips;
  if (editIdx !== '') {
    newTrips = trips.map((t, i) => i === parseInt(editIdx) ? entry : t);
  } else {
    newTrips = [...trips, entry];
  }

  const btn = document.getElementById('btn-generate');
  btn.textContent = '保存中...';
  btn.disabled = true;

  const ok = await saveToGitHub(newTrips);
  if (ok) {
    trips = newTrips;
    updateMap();
    updateStats();
    renderList();
    cancelEdit();
    alert('✅ 保存しました！地図に反映されました。');
  }

  btn.textContent = 'JSONを生成する';
  btn.disabled = false;
}

function copyJSON() {
  const text = document.getElementById('json-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '✅ コピーしました！';
    setTimeout(() => btn.textContent = '📋 コピーする', 2000);
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i===0 && name==='add') || (i===1 && name==='list'));
  });
  document.querySelectorAll('.tab-panel').forEach((p, i) => {
    p.classList.toggle('active', (i===0 && name==='add') || (i===1 && name==='list'));
  });
  if (name === 'list') renderList();
}

getToken();
loadTrips();
